name: CI

on:
  pull_request:
    paths:
      - "hampton-roads-history/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "hampton-roads-history/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: hampton-roads-history

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM_EMAIL: newsletter@example.com
      AD_HMAC_SECRET: ${{ secrets.AD_HMAC_SECRET || 'ci-placeholder-ad-secret' }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET || 'ci-placeholder-webhook-secret' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hampton-roads-history/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ vars.RUN_E2E == 'true' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM_EMAIL: newsletter@example.com
      AD_HMAC_SECRET: ${{ secrets.AD_HMAC_SECRET }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hampton-roads-history/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
